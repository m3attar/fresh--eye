body{

.title{

    font-size:30px;
    color:#00f7ff;
    margin:30px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
}
@media (max-width: 900px){
    .grid{
        grid-template-columns:repeat(2, 1fr);
    }
}

@media (max-width: 600px){
    .grid{
        grid-template-columns:1fr;
    }
}
.card{
    background:#12131c;
    padding:10px;
    border-radius:15px;
}

.card img{
    width:100%;
    border-radius:10px;
}
</style>

</head>
